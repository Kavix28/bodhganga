<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bodhganga Academy is India's premium UPSC and State PSC preparation platform offering structured courses, district-wise learning, curated notes, exam preparation resources, and educational content for aspirants across India." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bodhganga.in/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bodhganga.in/" />
    <meta property="og:title" content="Bodhganga Academy – UPSC, State PSC & Civil Services Preparation Platform" />
    <meta property="og:description" content="Bodhganga Academy is India's premium UPSC and State PSC preparation platform offering structured courses, district-wise learning, curated notes, exam preparation resources, and educational content for aspirants across India." />
    <meta property="og:image" content="https://bodhganga.in/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bodhganga.in/" />
    <meta name="twitter:title" content="Bodhganga Academy – UPSC, State PSC & Civil Services Preparation Platform" />
    <meta name="twitter:description" content="Bodhganga Academy is India's premium UPSC and State PSC preparation platform offering structured courses, district-wise learning, curated notes, exam preparation resources, and educational content for aspirants across India." />
    <meta name="twitter:image" content="https://bodhganga.in/logo.png" />

    <!-- Structured Data: Organization, WebSite & EducationalOrganization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Bodhganga Academy",
      "url": "https://bodhganga.in",
      "logo": "https://bodhganga.in/logo.png"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bodhganga Academy",
      "url": "https://bodhganga.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://bodhganga.in/marketplace?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Bodhganga Academy",
      "url": "https://bodhganga.in",
      "logo": "https://bodhganga.in/logo.png",
      "description": "Bodhganga Academy is India's premium UPSC and State PSC preparation platform offering structured courses, district-wise learning, curated notes, exam preparation resources, and educational content for aspirants across India.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Bodhganga Academy – UPSC, State PSC & Civil Services Preparation Platform</title>
    <style>
      :root {
        --background: 249 250 251;
        --foreground: 17 24 39;
        --card: 255 255 255;
        --card-foreground: 17 24 39;
        --popover: 255 255 255;
        --popover-foreground: 17 24 39;
        --primary: 37 99 235;
        --primary-foreground: 255 255 255;
        --secondary: 243 244 246;
        --secondary-foreground: 17 24 39;
        --muted: 243 244 246;
        --muted-foreground: 107 114 128;
        --accent: 243 244 246;
        --accent-foreground: 17 24 39;
        --destructive: 239 68 68;
        --destructive-foreground: 255 255 255;
        --border: 229 231 235;
        --input: 229 231 235;
        --ring: 37 99 235;
        --radius: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
