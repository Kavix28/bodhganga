# Development profile — safe defaults for local development
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev

# JWT — dev-only secret (never use in production)
jwt.secret=dev-only-secret-key-minimum-64-characters-long-replace-in-production-env

# Actuator — expose more in dev
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# Logging — verbose in dev
logging.level.com.bodhganga=DEBUG
logging.level.org.springframework.security=DEBUG

# Cloud Storage (AWS S3) — safe mock defaults for local development profile
aws.access.key.id=mock-access-key-id-for-dev
aws.secret.access.key=mock-secret-access-key-for-dev
aws.region=ap-south-1
aws.s3.bucket.name=bodhganga-dev-bucket
