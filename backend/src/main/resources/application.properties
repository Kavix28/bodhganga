spring.application.name=bodhganga

# Server Configuration
server.port=${PORT:9090}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bodhganga}}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration — MUST be set via environment variable in production
# Generate a strong secret: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OTP Configuration (MSG91)
otp.enabled=${OTP_ENABLED:true}

# Payment Gateway (Razorpay) — set via environment
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Cloud Storage (AWS S3) — set via environment
aws.access.key.id=${AWS_ACCESS_KEY_ID:mock-access-key-id-for-dev}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY:mock-secret-access-key-for-dev}
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucket.name=${AWS_S3_BUCKET:bodhganga-prod}

# Email Integration (SMTP) — set via environment
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — comma-separated list of allowed origins for production
# Example: ALLOWED_ORIGINS=https://bodhganga.in,https://www.bodhganga.in
# Leave unset for localhost-only (development)

# Actuator — restrict to health only in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.health.mail.enabled=false

# Logging
logging.level.com.bodhganga=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
