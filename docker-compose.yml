version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: bodhganga-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
      MONGO_INITDB_DATABASE: bodhganga
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - bodhganga-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bodhganga-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongodb:27017/bodhganga?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-bodhganga-prod}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:80,http://localhost:5173}
      GOOGLE_DRIVE_PIPELINE_ENABLED: ${GOOGLE_DRIVE_PIPELINE_ENABLED:-false}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-/app/google-credentials.json}
      GOOGLE_DRIVE_SOURCE_FOLDER_ID: ${GOOGLE_DRIVE_SOURCE_FOLDER_ID:-}
      GOOGLE_DRIVE_ARCHIVE_FOLDER_ID: ${GOOGLE_DRIVE_ARCHIVE_FOLDER_ID:-}
    ports:
      - "9090:9090"
    networks:
      - bodhganga-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/api/auth/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (React + Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://bodhganga.in/api}
    container_name: bodhganga-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - bodhganga-net

volumes:
  mongo_data:
    driver: local

networks:
  bodhganga-net:
    driver: bridge
